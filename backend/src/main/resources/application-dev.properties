# ------------------------------
# MYSQL DATABASE CONFIGURATION
# ------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/trip_plan?useUnicode=yes&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=root

# ------------------------------
# Hibernate
# ------------------------------
spring.jpa.hibernate.ddl-auto=update

# ------------------------------
# Logging
# ------------------------------
logging.level.com.cbk.trip=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR
logging.path=logs

# ------------------------------
# Nginx Server Properties
# ------------------------------
nginx.directory=C:\\nginx\\html\\tripplan\\images\\
nginx.url=http://localhost:8081/tripplan/images/
nginx.fileDirectory=C:\\nginx\\html\\tripplan\\attachments\\
nginx.fileUrl=http:\\localhost:8081/tripplan/attachments/
nginx.importFolder=C:\\nginx\\html\\tripplan\\excel\\imports\\
nginx.exportFolder=C:\\nginx\\html\\tripplan\\excel\\exports\\

# ------------------------------
# JMX default Domain
# ------------------------------
spring.jmx.default-domain=tripplan

# ------------------------------
# Profile
# ------------------------------
spring.config.activate.on-profile=dev

